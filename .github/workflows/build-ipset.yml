name: 构建纯静态 Android 版 ipset (GitHub)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载并安装 aarch64-linux-musl 交叉编译工具链
        run: |
          mkdir -p $HOME/toolchain
          cd $HOME/toolchain
          # 使用 GitHub Release 上的永久备份镜像，拒绝 404 和 IP 屏蔽！
          wget https://github.com/troglobit/misc/releases/download/11-20211120/aarch64-linux-musl-cross.tgz
          tar -xf aarch64-linux-musl-cross.tgz
          # 将工具链的 bin 目录加入全局环境变量
          echo "$HOME/toolchain/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH

      - name: 2. 编译 libmnl (完全静态)
        run: |
          mkdir -p $HOME/build_env
          wget https://netfilter.org/projects/libmnl/files/libmnl-1.0.5.tar.bz2
          tar -xjf libmnl-1.0.5.tar.bz2
          cd libmnl-1.0.5
          
          # 指定 host 为 musl 编译器
          ./configure --host=aarch64-linux-musl \
                      --prefix=$HOME/build_env \
                      --enable-static \
                      --disable-shared
          make -j$(nproc)
          make install

      - name: 3. 编译 ipset (完全静态)
        run: |
          wget https://ipset.netfilter.org/ipset-7.22.tar.bz2
          tar -xjf ipset-7.22.tar.bz2
          cd ipset-7.22
          
          export PKG_CONFIG_PATH=$HOME/build_env/lib/pkgconfig
          export CFLAGS="-I$HOME/build_env/include"
          
          # 【核心修复】：去掉坑人的 -all-static，只保留 -static 给 GCC
          export LDFLAGS="-L$HOME/build_env/lib -static"
          
          ./configure --host=aarch64-linux-musl \
                      --prefix=$HOME/build_env \
                      --disable-shared \
                      --with-kmod=no
          
          # 在编译阶段强制 libtool 执行全静态链接
          make LDFLAGS="-all-static" -j$(nproc)
          make install

      - name: 4. 验证二进制文件架构
        run: |
          echo "==== 查看文件属性，见证奇迹 ===="
          file $HOME/build_env/sbin/ipset
          # 正常情况下，输出必须包含 statically linked
          
          mkdir -p $GITHUB_WORKSPACE/output
          cp $HOME/build_env/sbin/ipset $GITHUB_WORKSPACE/output/

      - name: 5. 上传最终产物
        uses: actions/upload-artifact@v4
        with:
          name: ipset-android-aarch64-static
          path: output/ipset